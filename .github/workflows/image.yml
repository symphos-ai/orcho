name: image

on:
  # Verify image changes before they land: build + smoke, never publish.
  # Without this a broken image is only discovered after it is already live.
  pull_request:
    paths:
      - ".github/workflows/image.yml"
      - "docker/**"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/image.yml"
      - "docker/**"
      - "pyproject.toml"
  release:
    types: [published]
  schedule:
    # Weekly rebuild so the bundled agent CLIs track vendor releases.
    - cron: "17 5 * * 1"
  workflow_dispatch:
    inputs:
      orcho_version:
        description: "orcho version to install (empty = latest release)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version, tags, and labels
        id: meta
        run: |
          VERSION="${{ github.event.inputs.orcho_version }}"
          if [ -z "$VERSION" ] && [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          TAGS="ghcr.io/${{ github.repository_owner }}/orcho:latest"
          if [ -n "$VERSION" ]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/orcho:${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=Orcho"
            echo "org.opencontainers.image.description=Local-first control plane for cross-agent AI software delivery"
            echo "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
            echo "org.opencontainers.image.url=https://github.com/${{ github.repository }}"
            echo "org.opencontainers.image.documentation=https://docs.orcho.dev/start/installation-methods/"
            echo "org.opencontainers.image.vendor=Symphos"
            echo "org.opencontainers.image.licenses=Apache-2.0"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            if [ -n "$VERSION" ]; then
              echo "org.opencontainers.image.version=$VERSION"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Smoke BEFORE publish. A broken image must never reach :latest â€” that
      # already happened once (a `claude` that could not start shipped, because
      # the only smoke test ran against the ALREADY-pushed image).
      #
      # Multi-arch cannot be `load`ed into the daemon, so build the runner's
      # own arch first and load that. The multi-arch publish below reuses these
      # layers from cache, so this costs one arch's build, not two.
      - name: Build image for smoke test (not pushed)
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            ORCHO_VERSION=${{ steps.meta.outputs.version }}
          tags: orcho:smoke
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke-test image
        run: |
          docker run --rm orcho:smoke orcho --help
          docker run --rm orcho:smoke claude --version
          docker run --rm orcho:smoke codex --version
          docker run --rm orcho:smoke gemini --version

      - name: Publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ORCHO_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
